<p>Counter value: {{counterValue()}}</p>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<button (click)="increment($event)" class="counterButtons"><i class="fa-solid fa-plus"></i></button>
<button (click)="reset()" class="counterButtons"><i class="fa-solid fa-rotate"></i></button>
<button (click)="decrement()" class="counterButtons"><i class="fa-solid fa-minus"></i></button>
